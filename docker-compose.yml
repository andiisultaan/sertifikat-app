services:
  # Laravel Backend (PHP-FPM)
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sertifikat_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - db
      - redis
    networks:
      - sertifikat_net
    environment:
      - APP_ENV=local

  # Queue Worker
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sertifikat_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./backend:/var/www
    depends_on:
      - db
      - redis
    networks:
      - sertifikat_net

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sertifikat_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - app
    networks:
      - sertifikat_net
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: sertifikat_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - sertifikat_net

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: sertifikat_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: sertifikat_ukk
      MYSQL_USER: sertifikat_user
      MYSQL_PASSWORD: sertifikat_pass
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sertifikat_net

  # Redis Queue
  redis:
    image: redis:7-alpine
    container_name: sertifikat_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sertifikat_net

networks:
  sertifikat_net:
    driver: bridge

volumes:
  db_data:
  redis_data:
