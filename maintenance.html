<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Server Maintenance</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f9fafb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .box {
        text-align: center;
        max-width: 480px;
        padding: 2rem;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.75rem;
        color: #1f2937;
        margin-bottom: 1rem;
        font-weight: 700;
      }
      p {
        color: #6b7280;
        margin-bottom: 1.5rem;
        line-height: 1.7;
        font-size: 1rem;
      }
      .badge {
        background: #fef9c3;
        border: 1px solid #fde68a;
        color: #92400e;
        padding: .5rem 1.25rem;
        border-radius: 8px;
        font-size: .875rem;
        margin-bottom: 2rem;
        display: inline-block;
        font-weight: 500;
      }
      button {
        background: #2563eb;
        color: white;
        border: none;
        padding: .75rem 2rem;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background .2s;
        display: inline-flex;
        align-items: center;
        gap: .5rem;
      }
      button:hover { background: #1d4ed8; }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-cog-icon lucide-cog">
          <path d="M11 10.27 7 3.34" />
          <path d="m11 13.73-4 6.93" />
          <path d="M12 22v-2" />
          <path d="M12 2v2" />
          <path d="M14 12h8" />
          <path d="m17 20.66-1-1.73" />
          <path d="m17 3.34-1 1.73" />
          <path d="M2 12h2" />
          <path d="m20.66 17-1.73-1" />
          <path d="m20.66 7-1.73 1" />
          <path d="m3.34 17 1.73-1" />
          <path d="m3.34 7 1.73 1" />
          <circle cx="12" cy="12" r="2" />
          <circle cx="12" cy="12" r="8" />
        </svg>
      </div>
      <h1>Server Sedang Dalam Pemeliharaan</h1>
      <p>
        Kami sedang melakukan pemeliharaan sistem untuk meningkatkan layanan.<br />
        Silakan coba kembali dalam beberapa saat.
      </p>
      <div class="badge">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-hourglass"
          style="display:inline;vertical-align:middle;margin-right:4px;"
        >
          <path d="M5 22h14" />
          <path d="M5 2h14" />
          <path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22" />
          <path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2" />
        </svg>
        Sistem akan kembali normal secepatnya
      </div>
      <br />
      <button onclick="location.reload()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rotate-cw">
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
          <path d="M21 3v5h-5" />
        </svg>
        Coba Lagi
      </button>
    </div>
  </body>
</html>
